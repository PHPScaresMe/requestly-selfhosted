server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let react-router handle paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Built browser-extension archive. Served as an attachment so the browser
    # treats it as a download even when content-type defaults pick text/plain.
    location = /extension.zip {
        add_header Content-Disposition 'attachment; filename="requestly-extension.zip"';
        add_header Cache-Control "no-store";
        types { application/zip zip; }
        try_files $uri =404;
    }

    # Cache build assets aggressively.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # No-cache for index.html so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
